<!DOCTYPE html>
<html>
<head>
    <title>Phillies Ticket Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #E81828; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .price-list { list-style: none; padding: 0; }
        .price-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚾ Phillies Tracker (122-125)</h1>
        <p id="status">Last Update: Loading...</p>
        <div id="prices" class="price-list"></div>
        <br>
        <button onclick="loadData()">Refresh UI Data</button>
    </div>

    <script>
        function loadData() {
            document.getElementById('status').innerText = "Updating...";
            fetch('data.json?t=' + Date.now()) // Cache buster
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status').innerText = "Last Parsed: " + data.last_update;
                    const container = document.getElementById('prices');
                    container.innerHTML = '';
                    for (let sec in data.sections) {
                        container.innerHTML += `<div class="price-item"><span>Section ${sec}</span> <strong>$${data.sections[sec]}</strong></div>`;
                    }
                });
        }
        loadData();
    </script>
</body>
</html>
