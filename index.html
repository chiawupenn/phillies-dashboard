<!DOCTYPE html>
<html>
<head>
    <title>Phillies Ticket Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .game-row { display: grid; grid-template-columns: 100px 1fr 200px; padding: 15px 0; border-bottom: 1px solid #eee; align-items: center; }
        .price-grid { font-size: 0.85em; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .red-btn { background: #E81828; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; float: right; font-weight: bold; }
        .date { color: #E81828; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚾ Phillies Schedule & Prices <button class="red-btn" onclick="location.reload()">Manual UI Refresh</button></h1>
        <div id="game-list">Loading schedule...</div>
    </div>
    <script>
        fetch('games.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('game-list');
                list.innerHTML = '';
                data.forEach(g => {
                    list.innerHTML += `
                        <div class="game-row">
                            <div class="date">${g.weekday}<br>${g.date}</div>
                            <div><strong>vs ${g.opponent}</strong><br><small>${g.time}</small></div>
                            <div class="price-grid">
                                <span>Sec 122: <b>$${g.p122 || '--'}</b></span>
                                <span>Sec 125: <b>$${g.p125 || '--'}</b></span>
                            </div>
                        </div>`;
                });
            });
    </script>
</body>
</html>
